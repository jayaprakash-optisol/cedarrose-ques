sonar.projectKey=cedar-rose-questionnaire-web
sonar.projectName=Cedar Rose Questionnaire Web
sonar.projectVersion=1.0.0

sonar.host.url=http://localhost:9000

sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8

sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  src/mocks/**,\
  src/services/mock/**,\
  src/services/index.ts,\
  src/types/**,\
  src/components/**,\
  src/features/**,\
  src/app/**,\
  src/config/env.ts

sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

sonar.coverage.exclusions=\
  **/tests/**,\
  src/main.tsx,\
  src/mocks/**,\
  src/services/mock/**,\
  src/services/index.ts,\
  src/types/**,\
  src/components/**,\
  src/features/**,\
  src/app/**,\
  src/config/env.ts,\
  src/lib/workflow-completion.ts

sonar.coverage.minimum=90
sonar.qualitygate.wait=true

sonar.cpd.exclusions=\
  src/mocks/**,\
  src/services/mock/**,\
  src/components/**,\
  src/features/**,\
  src/app/**,\
  src/types/**
