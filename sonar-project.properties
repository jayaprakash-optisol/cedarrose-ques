sonar.projectKey=cedarrose-opshub
sonar.projectName=CedarRose OpsHub
sonar.projectVersion=1.0.0

sonar.sources=apps/api/src,apps/web/src
sonar.tests=apps/api/tests,apps/web/tests
sonar.sourceEncoding=UTF-8

sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  apps/api/src/db/migrations/**,\
  apps/api/src/db/seeds/**,\
  apps/api/src/swagger/**,\
  apps/web/src/mocks/**

sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

sonar.javascript.lcov.reportPaths=apps/api/coverage/lcov.info,apps/web/coverage/lcov.info
sonar.typescript.lcov.reportPaths=apps/api/coverage/lcov.info,apps/web/coverage/lcov.info

# Only bootstrap / infra excluded from coverage metrics — all business logic must be tested.
sonar.coverage.exclusions=\
  **/tests/**,\
  apps/api/src/main.ts,\
  apps/api/src/db/migrations/**,\
  apps/api/src/db/seeds/**,\
  apps/api/src/swagger/**,\
  apps/web/src/main.tsx,\
  apps/web/src/mocks/**

sonar.qualitygate.wait=true
sonar.coverage.minimum=85
